<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Oido - Chat de Voz</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- Firebase SDK (modular, from CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import {
      getDatabase, ref, push, set, onChildAdded, onValue, onDisconnect
    } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    // Expose Firebase functions globally for our modules
    window.firebase = {
      initializeApp, getDatabase, ref, push, set,
      onChildAdded, onValue, onDisconnect,
      database: getDatabase,
    };

    // Now load our app
    import("./js/app.js");
  </script>
</head>
<body>

  <!-- Screen 1: Password -->
  <div id="password-screen" class="screen active">
    <h1>Oido</h1>
    <p>Ingresa la clave para entrar a la sala</p>
    <input type="password" id="password-input" placeholder="Clave" autocomplete="off">
    <div class="error-text" id="password-error"></div>
    <button class="btn" id="password-btn">Entrar</button>
  </div>

  <!-- Screen 2: Name & Color Setup -->
  <div id="setup-screen" class="screen">
    <h2 id="setup-title">Tu nombre y color</h2>
    <input type="text" id="name-input" placeholder="Tu nombre" autocomplete="off" maxlength="20">
    <div class="color-picker" id="color-picker"></div>
    <label class="toggle-label" id="readonly-toggle-label">
      <input type="checkbox" id="readonly-toggle">
      <span>Solo lectura (no microfono)</span>
    </label>
    <div class="error-text" id="setup-error"></div>
    <div class="setup-actions">
      <button class="btn btn-ghost hidden" id="setup-cancel-btn">Cancelar</button>
      <button class="btn" id="setup-btn">Unirse</button>
    </div>
  </div>

  <!-- Screen 3: Voice Enrollment -->
  <div id="enrollment-screen" class="screen">
    <h2>Tu voz</h2>
    <p class="enrollment-instruction">Lee esta frase en voz alta para que la app reconozca tu voz</p>
    <div class="enrollment-phrase" id="enrollment-phrase"></div>
    <div class="mic-level-bar enrollment-bar">
      <div class="mic-level-bar-fill" id="enrollment-level-bar-fill"></div>
    </div>
    <p class="enrollment-status" id="enrollment-status">Toca grabar y lee la frase</p>
    <p class="enrollment-pitch" id="enrollment-pitch"></p>
    <div class="error-text" id="enrollment-error"></div>
    <div class="enrollment-buttons">
      <button class="btn" id="enrollment-record-btn">Grabar</button>
      <button class="btn" id="enrollment-continue-btn" disabled>Continuar</button>
    </div>
  </div>

  <!-- Screen 4: Chat Room -->
  <div id="chat-screen" class="screen">
    <div class="chat-header">
      <div class="user-pill" id="user-pill" title="Tu nombre">
        <span class="user-pill-dot" id="user-pill-dot"></span>
        <span class="user-pill-name" id="user-pill-name">Oido</span>
      </div>
      <div class="header-controls">
        <div class="mic-level-bar" id="mic-level-bar" title="Nivel de microfono">
          <div class="mic-level-bar-fill" id="mic-level-bar-fill"></div>
        </div>
        <div class="font-controls">
          <button class="font-btn" id="font-decrease" title="Smaller text">A-</button>
          <button class="font-btn" id="font-increase" title="Larger text">A+</button>
        </div>
        <div class="settings-dropdown">
          <button class="icon-btn" id="settings-btn" title="Ajustes" aria-label="Ajustes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <div class="settings-list hidden" id="settings-list">
            <button class="settings-item" id="settings-edit-profile">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/>
              </svg>
              <span>Cambiar nombre y color</span>
            </button>
            <button class="settings-item" id="settings-rerecord">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" x2="12" y1="19" y2="22"/>
              </svg>
              <span>Re-grabar voz</span>
            </button>
            <div class="settings-separator" role="separator"></div>
            <button class="settings-item" id="settings-logout">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" x2="9" y1="12" y2="12"/>
              </svg>
              <span>Cerrar sesión</span>
            </button>
            <button class="settings-item settings-item-danger" id="settings-clear">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/>
                <path d="M14 11v6"/>
                <path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
              </svg>
              <span>Limpiar chat</span>
            </button>
          </div>
        </div>
        <div class="users-dropdown">
          <button class="users-btn" id="users-btn">
            <span id="users-count">0</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </button>
          <div class="users-list hidden" id="users-list"></div>
        </div>
      </div>
    </div>

    <div class="chat-messages" id="chat-messages">
      <!-- Messages will be rendered here -->
    </div>

    <div class="chat-footer">
      <button class="mic-btn" id="mic-btn" title="Activar microfono">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" x2="12" y1="19" y2="22"/>
        </svg>
      </button>
      <span class="mic-status" id="mic-status">Toca para hablar</span>
    </div>
  </div>

  <!-- Replaced by .github/workflows/deploy.yml at deploy time. Stays "dev" locally. -->
  <div class="version-tag" id="version-tag">__VERSION__</div>
  <script>
    (function () {
      var v = document.getElementById("version-tag");
      if (v && v.textContent === "__VERSION__") v.textContent = "dev";
    })();
  </script>

  <!-- Register the SW that forces fresh HTML. Once a client has this code,
       every future build is picked up automatically: a controllerchange
       reload runs as soon as the new SW activates. -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("./sw.js").then(function (reg) {
          reg.update();
        }).catch(function () { /* ignore */ });

        var refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () {
          if (refreshing) return;
          refreshing = true;
          location.reload();
        });
      });
    }
  </script>

</body>
</html>
