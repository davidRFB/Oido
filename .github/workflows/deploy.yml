name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Inject version into index.html
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE="$(date -u +%Y-%m-%d)"
          # Only substitute the placeholder inside the version-tag div
          # (>__VERSION__<). The bare string also appears in a JS fallback
          # check; substituting it there flips the check and shows "dev".
          sed -i "s|>__VERSION__<|>${SHORT_SHA} · ${DATE}<|g" index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v4
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
